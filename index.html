<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>套房代管記帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ===== 設計系統（沿用站內 style.css 的變數，內嵌成單檔可開）===== */
:root{
  --bg:#FBF6EE; --bg2:#F4ECDF; --ink:#26221C; --ink-soft:#5C544A;
  --line:#E4D8C5; --card:#FFFFFF;
  --clay:#BD5E39; --clay-d:#9C4A2B; --teal:#3C7A62; --teal-d:#2E5F4C;
  --amber:#C2902B; --red:#B23F2A; --gold:#C9A24A;
  --shadow:0 8px 28px rgba(60,44,28,.10), 0 2px 6px rgba(60,44,28,.06);
  --serif:"Noto Serif TC",serif;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
body{background-image:radial-gradient(circle at 12% -5%,#F7EEDF 0,transparent 42%),radial-gradient(circle at 110% 8%,#F0E5D2 0,transparent 46%);padding-bottom:60px}

/* 頂部標頭 */
.top{background:#2C2620;color:#F7EEDF;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.top-inner{max-width:1000px;margin:0 auto;padding:10px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.top .logo{font-family:var(--serif);font-weight:900;font-size:16px;color:var(--gold);white-space:nowrap}
.proto-tag{font-size:11px;background:rgba(201,162,74,.2);color:var(--gold);padding:2px 8px;border-radius:999px}
.month-pick{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:14px}
.month-pick input,.month-pick select{padding:6px 8px;border-radius:8px;border:1px solid #5a5046;background:#3a322a;color:#F7EEDF;font-family:var(--sans);font-size:14px}
.month-pick .roc{font-weight:700;color:var(--gold);white-space:nowrap}
.parity{font-size:12px;padding:2px 8px;border-radius:999px;font-weight:700}
.parity.even{background:rgba(60,122,98,.3);color:#bfe6d4}
.parity.odd{background:rgba(189,94,57,.3);color:#f0c3ac}

/* 分頁 */
.tabs{max-width:1000px;margin:0 auto;padding:10px 14px 0;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{border:none;background:transparent;font-family:var(--sans);font-weight:700;font-size:14px;color:var(--ink-soft);
  padding:9px 14px;border-radius:10px 10px 0 0;cursor:pointer;white-space:nowrap}
.tab.active{background:var(--card);color:var(--clay-d);box-shadow:0 -2px 8px rgba(60,44,28,.06)}

.wrap{max-width:1000px;margin:0 auto;padding:6px 14px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.panel h2{font-family:var(--serif);font-size:18px;font-weight:900;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.panel h2 .bar{width:5px;height:20px;background:var(--clay);border-radius:3px}
.sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px}

.btn{border:none;cursor:pointer;font-family:var(--sans);font-weight:700;font-size:14px;padding:9px 16px;border-radius:10px;background:var(--clay);color:#fff;transition:.15s}
.btn:hover{background:var(--clay-d)}
.btn.ghost{background:#fff;color:var(--clay-d);border:1.5px solid var(--line)}
.btn.sm{padding:6px 12px;font-size:13px}
.btn.teal{background:var(--teal)}.btn.teal:hover{background:var(--teal-d)}

table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px 6px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
th{font-size:12px;color:var(--clay-d);font-weight:700;border-bottom:2px solid var(--line)}
tr.sum td{font-weight:900;border-top:2px solid var(--ink);border-bottom:none;font-size:15px}
td input{width:90px;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:14px;text-align:right;background:#FFFDF9}
td input:focus{outline:none;border-color:var(--clay)}
.num{font-variant-numeric:tabular-nums}
.neg{color:var(--red)}.pos{color:var(--teal-d)}

/* 設定表單 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--clay-d);margin-bottom:4px}
.fld input{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--sans);font-size:14px;background:#FFFDF9}
.fld input:focus{outline:none;border-color:var(--clay)}

/* 租客 LINE 卡 */
.bills{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.billcard{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#FFFDF9}
.billcard .bh{background:var(--bg2);padding:8px 12px;font-weight:900;font-family:var(--serif);display:flex;justify-content:space-between;align-items:center}
.billcard .bh .who{font-size:12px;font-weight:500;color:var(--ink-soft)}
.billcard pre{font-family:var(--sans);font-size:13.5px;white-space:pre-wrap;padding:12px;line-height:1.7;margin:0;min-height:90px}
.billcard .bf{padding:8px 12px;border-top:1px dashed var(--line);text-align:right}

/* 對帳輸出 */
.statement{background:#FFFDF9;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:14px}
.statement .row{display:flex;justify-content:space-between;padding:3px 0}
.statement .rule{border-top:1px solid var(--line);margin:6px 0}
.statement .big{font-weight:900;font-size:16px;border-top:2px solid var(--ink);margin-top:6px;padding-top:8px}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tip{background:#FBF3E0;border:1px solid #EBD8AE;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#7a6a3e;margin-top:10px}
.hide{display:none}
@media(max-width:560px){.grid2{grid-template-columns:1fr}.month-pick{width:100%;margin-left:0}}
</style>
</head>
<body>

<div class="top">
  <div class="top-inner">
    <span class="logo">套房代管記帳</span>
    <span class="proto-tag">雲端同步</span>
    <button id="logoutBtn" class="btn ghost sm" style="padding:5px 10px;font-size:12px">登出</button>
    <div class="month-pick">
      <span>民國</span>
      <input id="yIn" type="number" style="width:64px" >
      <span>年</span>
      <select id="mIn"></select>
      <span>月</span>
      <span class="roc" id="rocLbl"></span>
      <span class="parity" id="parityLbl"></span>
    </div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="wrap" id="view"></div>

<div class="toast" id="toast"></div>

<!-- 登入畫面（未登入時覆蓋全畫面）-->
<div id="loginOverlay" style="position:fixed;inset:0;background:var(--bg);z-index:500;display:none;align-items:center;justify-content:center;padding:20px">
  <div class="panel" style="max-width:340px;width:100%">
    <h2 style="font-family:var(--serif);font-size:22px;margin-bottom:2px">套房代管記帳</h2>
    <div class="sub">請登入以使用</div>
    <div class="fld"><label>Email</label><input id="loginEmail" type="email" autocomplete="username"></div>
    <div class="fld"><label>密碼</label><input id="loginPw" type="password" autocomplete="current-password"></div>
    <button class="btn" id="loginBtn" style="width:100%">登入</button>
    <div id="loginMsg" style="color:var(--red);font-size:13px;margin-top:8px;min-height:18px"></div>
  </div>
</div>

<script>
/* =========================================================================
   套房代管記帳 — 原型（純前端、localStorage）
   目的：先讓使用者看實際呈現、逐步調整版面；確認後再接 Supabase + Claude OCR。
   所有金流計算寫成純函式，方便日後搬到後端 / LINE 重用。
   ========================================================================= */
const $ = s => document.querySelector(s);
const LS_KEY = 'rentmgmt_proto_v4';

/* ---- Supabase 設定（anon/publishable key 可公開，保護靠 RLS + 登入）---- */
const SUPA_URL = 'https://zhxiygrnjotjrjxcmwyg.supabase.co';
const SUPA_KEY = 'sb_publishable_5C-yhMHRr8U_jr_7AO9ldw_ocG4e0sJ';
let sb=null, SB_USER=null;

/* ---- 預設資料（房間、常數，依使用者提供）---- */
const DEFAULT = {
  settings:{
    svcDeduct:19000,      // 服務費基數扣除額
    svcRate:0.10,         // 服務費比例
    cableFee:5002,        // 第四台費（逢 cableMonths 從屋主匯款扣）
    cableMonths:[3,6,9,12],
    parkingFee:100,       // 每個機車車位 / 月
    elecRate:5,           // 每度電價
    startRoc:115, startMonth:1, // 起算月份（民國）
    seedRemit:0,          // 起算月「上月實際匯給屋主金額」起始值（登入後在設定填）
    adjustToOwner:false,  // 折扣由代管方吸收→屋主照領原租金（false=屋主帳不扣折扣）
    bank:{name:'', code:'', acct:''} // 屋主匯款帳戶（敏感→登入後在設定頁輸入，存雲端，不寫進程式碼）
  },
  // group：同一租客的多間房（同群組合併成一封訊息）
  // adjusts：每房可有多筆調整（負值=折扣），when=every每月／even雙月(收電費月)／odd單月
  // seedReading = 目前電表最新讀數（由電表照片 OCR 得來，當作下一期的「上期」）
  rooms:[
    {no:'101',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'201',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'202',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'203',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'301',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'302',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'303',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'401',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
    {no:'402',rent:0,parking:0,water:0,deposit:0,seedReading:0,group:'',adjusts:[],name:'',contact:'',start:'',end:'',active:true},
  ],
  months:{} // key "YYYY-M" -> {readings:{no:本期度數}, deposits:{no:退押金}, rentOverride:{no:當月房租}, bill:{elec,water}, note}
};

/* ---- 載入 / 儲存（雲端為主、本機為離線備份）---- */
let DB = structuredClone(DEFAULT);
let saveT;
function save(){
  localStorage.setItem(LS_KEY, JSON.stringify(DB));   // 離線備份
  clearTimeout(saveT); saveT=setTimeout(saveCloud, 600); // 去抖動寫雲端
}
async function saveCloud(){
  if(!SB_USER) return;
  const {error}=await sb.from('app_state').upsert({uid:SB_USER.id, data:DB, updated_at:new Date().toISOString()});
  if(error){ console.error(error); toast('雲端儲存失敗，已存本機'); }
}
// 補上預設缺漏的欄位，避免日後新增欄位讓舊資料出錯
function migrate(d){
  d.settings=Object.assign(structuredClone(DEFAULT.settings), d.settings||{});
  if(!d.settings.bank) d.settings.bank=structuredClone(DEFAULT.settings.bank);
  d.rooms=d.rooms||structuredClone(DEFAULT.rooms);
  d.months=d.months||{};
  return d;
}
async function loadCloud(){
  try{
    const {data}=await sb.from('app_state').select('data').eq('uid',SB_USER.id).maybeSingle();
    if(data&&data.data&&data.data.rooms){ DB=migrate(data.data); return; }
  }catch(e){ console.error(e); }
  // 雲端沒有資料 → 用本機備份(若有)或預設，並寫上雲端
  try{ const s=JSON.parse(localStorage.getItem(LS_KEY)); if(s&&s.rooms){ DB=migrate(s); await saveCloud(); return; } }catch(e){}
  DB=structuredClone(DEFAULT); await saveCloud();
}

/* ---- 登入 / 啟動 ---- */
async function bootstrap(){
  sb=window.supabase.createClient(SUPA_URL, SUPA_KEY);
  $('#logoutBtn').onclick=async()=>{ await sb.auth.signOut(); location.reload(); };
  $('#loginBtn').onclick=doLogin;
  $('#loginPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
  const {data:{session}}=await sb.auth.getSession();
  if(session) await afterLogin(); else $('#loginOverlay').style.display='flex';
}
async function doLogin(){
  const email=$('#loginEmail').value.trim(), password=$('#loginPw').value;
  $('#loginMsg').textContent='登入中…';
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ $('#loginMsg').textContent='登入失敗：'+error.message; return; }
  $('#loginMsg').textContent='';
  await afterLogin();
}
async function afterLogin(){
  const {data:{user}}=await sb.auth.getUser();
  SB_USER=user;
  await loadCloud();
  $('#loginOverlay').style.display='none';
  init();
}

/* ---- 工具 ---- */
const fmt = n => Math.round(n).toLocaleString('en-US');      // 金額：千分位
const roc = y => y - 1911;                                    // 西元→民國
function mkey(y,m){ return y+'-'+m; }
function getMonth(y,m){ const k=mkey(y,m); if(!DB.months[k]) DB.months[k]={readings:{},deposits:{},rentOverride:{},bill:{},note:''}; return DB.months[k]; }
function ownerSub(r){ return rentOf(r)+r.parking*DB.settings.parkingFee; }       // 進屋主：房租+車位
function rentOf(r,y,m){ const ov=(y!=null)?(DB.months[mkey(y,m)]?.rentOverride?.[r.no]):null; return (ov!=null&&ov!=='')?+ov:r.rent; }
const activeRooms = ()=>DB.rooms.filter(r=>r.active);

/* ---- 電費：找上期讀數（往前找最近一筆已輸入的本期讀數，否則用 seedReading）---- */
function prevReading(no, y, m){
  for(let i=1;i<=24;i++){
    let mm=m-i, yy=y; while(mm<=0){mm+=12;yy--;}
    const v=DB.months[mkey(yy,mm)]?.readings?.[no];
    if(v!=null&&v!=='') return +v;
  }
  const r=DB.rooms.find(x=>x.no===no); return r?+r.seedReading:0;
}
function elecOf(r,y,m){
  const cur=DB.months[mkey(y,m)]?.readings?.[r.no];
  if(cur==null||cur==='') return null;          // 尚未輸入本期 → 無電費
  const prev=prevReading(r.no,y,m);
  const use=Math.max(0,+cur-prev);
  return {prev,cur:+cur,use,amount:use*DB.settings.elecRate};
}

/* ---- 服務費鏈：服務費(本月)=(上月實際匯款−扣除額)×比例 ---- */
function isCable(m){ return DB.settings.cableMonths.includes(+m); }
function depositSum(y,m){ const d=DB.months[mkey(y,m)]?.deposits||{}; return Object.values(d).reduce((a,b)=>a+(+b||0),0); }
function adjOwner(r,m){ return DB.settings.adjustToOwner?adjSum(r,m):0; } // 本月適用調整是否計入屋主帳
function ownerIncome(y,m){ return activeRooms().reduce((a,r)=>a+rentOf(r,y,m)+r.parking*DB.settings.parkingFee+adjOwner(r,m),0); }
function prevRemit(y,m){
  // 上一個月
  let pm=m-1, py=y; if(pm<=0){pm=12;py--;}
  const before = (py<DB.settings.startRoc)||(py===DB.settings.startRoc&&pm<DB.settings.startMonth);
  if(before) return DB.settings.seedRemit;       // 起算月之前 → 用手動起始值
  return remit(py,pm);
}
const _memo={};
function serviceFee(y,m){ return Math.round(Math.max(0, prevRemit(y,m)-DB.settings.svcDeduct)*DB.settings.svcRate); }
function remit(y,m){
  const k=mkey(y,m); if(_memo[k]!=null) return _memo[k];
  _memo[k]=0; // 防遞迴
  const v = ownerIncome(y,m) - serviceFee(y,m) - (isCable(m)?DB.settings.cableFee:0) - depositSum(y,m);
  _memo[k]=v; return v;
}
function clearMemo(){ for(const k in _memo) delete _memo[k]; }

/* =========================================================================
   租客 LINE 文字（民國年，照使用者格式）
   ========================================================================= */
// 調整：依時機(每月/雙月/單月)篩出本月適用的調整
function adjApplies(a,m){ return a.when==='every'||(a.when==='even'&&m%2===0)||(a.when==='odd'&&m%2===1); }
function roomAdjusts(r,m){ return (r.adjusts||[]).filter(a=>adjApplies(a,m)); }
function adjSum(r,m){ return roomAdjusts(r,m).reduce((s,a)=>s+(+a.amount||0),0); }

// 單一房間「本月應收總額」（含房租＋車位＋水費＋本月適用調整＋電費）
function roomTotal(r,y,m){
  const e=elecOf(r,y,m);
  return rentOf(r,y,m)+r.parking*DB.settings.parkingFee+r.water+adjSum(r,m)+(e?e.amount:0);
}

// 單一租客（一間房）訊息
function tenantBill(r,y,m){
  const rent=rentOf(r,y,m), park=r.parking*DB.settings.parkingFee, water=r.water;
  const e=elecOf(r,y,m), elec=e?e.amount:0;
  let t=`${y}年${m}月份租金共計${fmt(roomTotal(r,y,m))}元\n`;
  t+=`租金${fmt(rent)}元\n`;
  if(park>0) t+=`車位${fmt(park)}元\n`;
  if(water>0) t+=`水費${fmt(water)}元\n`;
  roomAdjusts(r,m).forEach(a=>{ t+=`${a.label||'調整'}：${fmt(a.amount)}元\n`; });
  if(e){
    t+=`電費${fmt(elec)}元\n\n電費\n`;
    t+=`${e.cur}-${e.prev}=${e.use}度\n`;
    t+=`${e.use}度*${DB.settings.elecRate}元=${fmt(elec)}`;
  }
  return t.trimEnd();
}

// 同一租客多間房 → 合併成一封（摘要列 + 有電費者的明細區）
function groupBill(rooms,y,m){
  const tot=rooms.reduce((a,r)=>a+roomTotal(r,y,m),0);
  let t=`${y}年${m}月份房租合計${fmt(tot)}元\n`;
  // 摘要列：房號：金額（無明細的房，把調整標在這）
  rooms.forEach(r=>{
    const hasDetail=!!elecOf(r,y,m);
    const adjs=roomAdjusts(r,m);
    const note=(adjs.length&&!hasDetail)?`（${adjs.map(a=>`${a.label||'調整'}${fmt(a.amount)}元`).join('、')}）`:'';
    t+=`${r.no}：${fmt(roomTotal(r,y,m))}元${note}\n`;
  });
  // 明細區：有電費的房（列出房租／調整／電費算式）
  const det=rooms.filter(r=>elecOf(r,y,m));
  if(det.length){
    t+=`----------------------------------------\n`;
    det.forEach((r,i)=>{
      const e=elecOf(r,y,m), park=r.parking*DB.settings.parkingFee;
      t+=`${r.no} 總計${fmt(roomTotal(r,y,m))}元\n`;
      t+=`房租${fmt(rentOf(r,y,m))}元\n`;
      if(park>0) t+=`車位${fmt(park)}元\n`;
      if(r.water>0) t+=`水費${fmt(r.water)}元\n`;
      roomAdjusts(r,m).forEach(a=>{ t+=`${a.label||'調整'}：${fmt(a.amount)}元\n`; });
      t+=`電費：${fmt(e.amount)}元\n`;
      t+=`${e.cur}-${e.prev}=${e.use}度\n`;
      t+=`${e.use}*${DB.settings.elecRate}=${fmt(e.amount)}元`;
      if(i<det.length-1) t+=`\n\n`;
    });
  }
  return t.trimEnd();
}

/* =========================================================================
   分頁
   ========================================================================= */
const TABS=[['bill','租客帳單'],['elec','收電費'],['owner','屋主對帳'],['util','水電盈虧'],['hist','歷史帳本'],['set','設定']];
let cur='bill', Y=115, M=6;

function init(){
  Y=DB.settings.startRoc; M=6;            // 預設停在 6 月方便看雙月示範
  const today=new Date(); Y=today.getFullYear()-1911; M=today.getMonth()+1;
  $('#yIn').value=Y;
  const ms=$('#mIn'); ms.innerHTML=''; for(let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=i;ms.appendChild(o);} ms.value=M;
  $('#tabs').innerHTML=TABS.map(([k,n])=>`<button class="tab" data-k="${k}">${n}</button>`).join('');
  $('#tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(b){cur=b.dataset.k;render();}});
  $('#yIn').addEventListener('input',()=>{Y=+$('#yIn').value;render();});
  ms.addEventListener('change',()=>{M=+ms.value;render();});
  render();
}
function render(){
  clearMemo();
  $('#rocLbl').textContent=`西元 ${Y+1911} 年`;
  const even=M%2===0;
  $('#parityLbl').textContent=even?'雙月 · 收電費':'單月';
  $('#parityLbl').className='parity '+(even?'even':'odd');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.k===cur));
  const v=$('#view');
  if(cur==='bill')  v.innerHTML=viewBill();
  if(cur==='elec')  v.innerHTML=viewElec();
  if(cur==='owner') v.innerHTML=viewOwner();
  if(cur==='util')  v.innerHTML=viewUtil();
  if(cur==='hist')  v.innerHTML=viewHist();
  if(cur==='set')   v.innerHTML=viewSet();
  bind();
}

/* ---- 租客帳單 ---- */
function billCard(label,who,id,txt){
  return `<div class="billcard"><div class="bh">${label}<span class="who">${who}</span></div>
    <pre id="${id}">${txt}</pre>
    <div class="bf"><button class="btn sm teal" data-copy="${id}">複製</button></div></div>`;
}
function viewBill(){
  // 依 group 分組（空 group 視為各自獨立）
  const groups={};
  activeRooms().forEach(r=>{const g=r.group||('_'+r.no);(groups[g]=groups[g]||[]).push(r);});
  const cards=Object.values(groups).map(rooms=>{
    if(rooms.length>1){
      const id='bill-'+rooms[0].no;
      const label=rooms.map(r=>r.no).join('＋');
      return billCard(label, rooms[0].name||'（同一租客）', id, groupBill(rooms,Y,M));
    }
    const r=rooms[0];
    return billCard(r.no, r.name||'（未填租客）', 'bill-'+r.no, tenantBill(r,Y,M));
  }).join('');
  return `<div class="panel"><h2><span class="bar"></span>租客帳單 · ${Y}年${M}月</h2>
    <div class="sub">每月都發。同一租客多間房會合併成一封。${M%2===0?'雙月已自動帶入電費（需先到「收電費」輸入本期度數）。':'單月：房租＋車位＋水費＋調整。'}　每張可單獨複製貼到 LINE。</div>
    <div class="bills">${cards}</div></div>`;
}

/* ---- 收電費 ---- */

  const mo=getMonth(Y,M);
  const rows=activeRooms().map(r=>{
    const prev=prevReading(r.no,Y,M);
    const cur=mo.readings[r.no]??'';
    const e=elecOf(r,Y,M);
    return `<tr>
      <td>${r.no}</td>
      <td class="num">${prev}</td>
      <td><input type="number" data-reading="${r.no}" value="${cur}" placeholder="本期"></td>
      <td class="num">${e?e.use+' 度':'—'}</td>
      <td class="num">${e?fmt(e.amount)+' 元':'—'}</td>
    </tr>`;
  }).join('');
  return `<div class="panel"><h2><span class="bar"></span>收電費 · ${Y}年${M}月</h2>
    <div class="sub">輸入各房本期電表度數（取整數、捨去最後紅色 0.1 位）。用量＝本期−上期，電費＝用量×${DB.settings.elecRate} 元。</div>

        <input type="file" id="ocrFiles" accept="image/*" multiple style="font-size:13px">
        <button class="btn sm teal" id="ocrBtn">辨識並自動填入</button>
        <span id="ocrStatus" style="font-size:12.5px;color:var(--ink-soft)"></span>
      </div>
      <div class="tip" style="margin-top:8px">一次選多張電表照片(照片要看得到手寫房號),Claude 自動讀「房號＋讀數」填進下表,你再核對。照片會先縮圖再上傳。</div>
    </div>
    <table><thead><tr><th>房號</th><th>上期</th><th>本期度數</th><th>用量</th><th>電費</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;

/* ---- 屋主對帳 ---- */

    const rent=rentOf(r,Y,M), park=r.parking*DB.settings.parkingFee, adj=adjOwner(r,M);
    const adjCell=anyAdj?`<td class="num neg">${adj?fmt(adj):'—'}</td>`:'';
    const lbl=roomAdjusts(r,M).map(a=>a.label).join('、');
    const note=adj?`<span style="font-size:11px;color:var(--ink-soft)"> ${lbl}</span>`:'';
    return `<tr><td>${r.no}${note}</td><td class="num">${fmt(rent)}</td><td class="num">${park?fmt(park):'—'}</td>${adjCell}<td class="num">${fmt(rent+park+adj)}</td></tr>`;
  }).join('');

      <div class="row"><span>房租收入合計（含車位${anyAdj?'、調整':''}）</span><span class="num">${fmt(income)}</span></div>
      <div class="row"><span>代管服務費<br><span style="font-size:11px;color:var(--ink-soft)">(上月匯款 ${fmt(pr)} − ${fmt(DB.settings.svcDeduct)}) × ${DB.settings.svcRate*100}%</span></span><span class="num neg">− ${fmt(svc)}</span></div>

      ${dep?`<div class="row"><span>退押金</span><span class="num neg">− ${fmt(dep)}</span></div>`:''}
      <div class="row big"><span>本月實匯屋主</span><span class="num">${fmt(out)}</span></div>
    </div>
    <div class="statement" style="margin-top:10px;background:var(--bg2)">
      <div style="font-weight:700;color:var(--clay-d);margin-bottom:4px">匯款帳戶（屋主）</div>
      <div class="row"><span>銀行</span><span>${DB.settings.bank.name}</span></div>
      <div class="row"><span>代號</span><span class="num">${DB.settings.bank.code}</span></div>
      <div class="row"><span>帳號</span><span class="num">${DB.settings.bank.acct}</span></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn teal sm" data-copy-owner>複製屋主對帳文字</button>
      <button class="btn ghost sm" data-copy-acct>複製匯款帳號</button>
    </div>
    <textarea id="ownerTxt" class="hide"></textarea>
    <h2 style="margin-top:20px;font-size:15px"><span class="bar"></span>退押金（退租時填，從當月匯款扣）</h2>

  </div>`;
}
function ownerText(){
  const income=ownerIncome(Y,M), svc=serviceFee(Y,M), cable=isCable(M)?DB.settings.cableFee:0, dep=depositSum(Y,M);
  const out=income-svc-cable-dep, pr=prevRemit(Y,M);
  let t=`【林口套房代管 · 屋主對帳】民國${Y}年${M}月\n──────────────\n`;
  activeRooms().forEach(r=>{const rent=rentOf(r,Y,M),p=r.parking*DB.settings.parkingFee,a=adjOwner(r,M),lbl=roomAdjusts(r,M).map(x=>x.label).join('、');
    t+=`${r.no}　房租${fmt(rent)}${p?` 車位${fmt(p)}`:''}${a?` ${lbl}${fmt(a)}`:''}　小計${fmt(rent+p+a)}\n`;});
  t+=`──────────────\n房租收入合計　${fmt(income)}\n代管服務費 (上月匯款${fmt(pr)}−${fmt(DB.settings.svcDeduct)})×${DB.settings.svcRate*100}%　− ${fmt(svc)}\n`;
  if(cable)t+=`第四台　− ${fmt(cable)}\n`;
  if(dep)t+=`退押金　− ${fmt(dep)}\n`;
  t+=`──────────────\n本月實匯屋主　${fmt(out)}\n\n`;
  t+=`匯款帳戶（屋主）\n銀行：${DB.settings.bank.name}\n代號：${DB.settings.bank.code}\n帳號：${DB.settings.bank.acct}`;
  return t;
}

/* ---- 水電盈虧 ---- */
function viewUtil(){
  const mo=getMonth(Y,M);
  // 預設帶兩張台電帳單(2樓、3樓);水費單含金額+度數
  if(!mo.elecBills) mo.elecBills=[{label:'2樓',amount:'',degrees:''},{label:'3樓',amount:'',degrees:''}];
  if(!mo.waterBill) mo.waterBill={amount:(mo.bill?.water??''),degrees:''};

  // 系統算:跟租客收到的電費 / 度數 / 水費
  const elecGot=activeRooms().reduce((a,r)=>{const e=elecOf(r,Y,M);return a+(e?e.amount:0);},0);
  const useGot =activeRooms().reduce((a,r)=>{const e=elecOf(r,Y,M);return a+(e?e.use:0);},0);
  const waterGot=activeRooms().reduce((a,r)=>a+r.water,0)*2; // 每月固定×2 個月

  // 台電帳單合計(多張)
  const billElec=mo.elecBills.reduce((a,b)=>a+(+b.amount||0),0);
  const billUse =mo.elecBills.reduce((a,b)=>a+(+b.degrees||0),0);
  const elecNet=elecGot-billElec, useDiff=useGot-billUse;
  // 台水
  const billWater=+mo.waterBill.amount||0, waterNet=waterGot-billWater;

  const billRows=mo.elecBills.map((b,i)=>`<tr>
    <td><input data-eb="${i}" data-f="label" value="${b.label||''}" style="width:64px"></td>
    <td><input type="number" data-eb="${i}" data-f="amount" value="${b.amount??''}" placeholder="金額"></td>
    <td><input type="number" data-eb="${i}" data-f="degrees" value="${b.degrees??''}" placeholder="度數"></td>
    <td><button class="btn ghost sm" data-eb-del="${i}" style="color:var(--red)">刪</button></td>
  </tr>`).join('');

  return `<div class="panel"><h2><span class="bar"></span>水電盈虧（內部）· ${Y}年${M}月</h2>
    <div class="sub">向租客收的電費／水費,對比台電／台水實付帳單看盈虧;並比對「收到度數」與「帳單度數」的差異(公電、誤差會差一點點,正常)。</div>

    <h2 style="font-size:15px;margin-top:4px"><span class="bar"></span>電費</h2>
    <table><thead><tr><th>電費單</th><th>實付金額</th><th>帳單度數</th><th></th></tr></thead>
      <tbody>${billRows}</tbody></table>
    <div style="margin:8px 0"><button class="btn ghost sm" id="ebAdd">＋ 新增電費單</button></div>
    <div class="statement">
      <div class="row"><span>收到電費(租客)</span><span class="num pos">+ ${fmt(elecGot)}</span></div>
      <div class="row"><span>台電實付合計</span><span class="num neg">− ${fmt(billElec)}</span></div>
      <div class="row big"><span>電費盈餘／不足</span><span class="num ${elecNet>=0?'pos':'neg'}">${elecNet>=0?'+ ':'− '}${fmt(Math.abs(elecNet))}</span></div>
      <div class="rule"></div>
      <div class="row"><span>收到度數合計(各房用量)</span><span class="num">${useGot} 度</span></div>
      <div class="row"><span>台電帳單度數合計</span><span class="num">${billUse} 度</span></div>
      <div class="row"><span>度數差異</span><span class="num ${useDiff>=0?'pos':'neg'}">${useDiff>=0?'+':'−'}${Math.abs(useDiff)} 度</span></div>
    </div>

    <h2 style="font-size:15px;margin-top:18px"><span class="bar"></span>水費</h2>
    <div class="statement">
      <div class="row"><span>收到水費(2 個月)</span><span class="num pos">+ ${fmt(waterGot)}</span></div>
      <div class="row"><span>台水實付金額</span><span class="num"><input type="number" data-wb="amount" value="${mo.waterBill.amount??''}" placeholder="0" style="width:110px"></span></div>
      <div class="row"><span>台水帳單度數</span><span class="num"><input type="number" data-wb="degrees" value="${mo.waterBill.degrees??''}" placeholder="度數" style="width:110px"></span></div>
      <div class="row big"><span>水費盈餘／不足</span><span class="num ${waterNet>=0?'pos':'neg'}">${waterNet>=0?'+ ':'− '}${fmt(Math.abs(waterNet))}</span></div>
    </div></div>`;
}

/* ---- 歷史帳本：列出每個月的關鍵數字，點「查看」跳到該月 ---- */
function monthRange(){
  let y=DB.settings.startRoc, m=DB.settings.startMonth;   // 起算月
  let ey=Y, em=M;                                          // 結束：取「目前選的月」與「有資料的最後一月」較晚者
  Object.keys(DB.months).forEach(k=>{const[yy,mm]=k.split('-').map(Number);if(yy>ey||(yy===ey&&mm>em)){ey=yy;em=mm;}});
  const arr=[]; let g=0;
  while((y<ey||(y===ey&&m<=em))&&g++<60){ arr.push([y,m]); m++; if(m>12){m=1;y++;} }
  return arr.reverse();                                    // 新到舊
}
function monthHasData(y,m){ const o=DB.months[mkey(y,m)]; if(!o)return false;
  return Object.keys(o.readings||{}).length||Object.values(o.deposits||{}).some(v=>+v)||(+o.bill?.elec||+o.bill?.water)||o.note; }
function viewHist(){
  const rows=monthRange().map(([y,m])=>{
    const income=ownerIncome(y,m),svc=serviceFee(y,m),cable=isCable(m)?DB.settings.cableFee:0,dep=depositSum(y,m),out=remit(y,m);
    const elecGot=activeRooms().reduce((a,r)=>{const e=elecOf(r,y,m);return a+(e?e.amount:0);},0);
    const here=(y===Y&&m===M);
    return `<tr style="${here?'background:#FBF3E0':''}">
      <td><b>${y}年${m}月</b>${m%2===0?' <span style="color:var(--teal-d);font-size:11px">雙</span>':''}${monthHasData(y,m)?'':' <span style="color:#bbb;font-size:11px">未填</span>'}</td>
      <td class="num">${fmt(income)}</td>
      <td class="num neg">−${fmt(svc)}</td>
      <td class="num">${cable?'−'+fmt(cable):'—'}</td>
      <td class="num">${dep?'−'+fmt(dep):'—'}</td>
      <td class="num"><b>${fmt(out)}</b></td>
      <td class="num">${elecGot?fmt(elecGot):'—'}</td>
      <td><button class="btn ghost sm" data-jump="${y}-${m}">查看</button></td>
    </tr>`;
  }).join('');
  return `<div class="panel"><h2><span class="bar"></span>歷史帳本</h2>
    <div class="sub">每個月的紀錄都保留著。點「查看」會跳到那個月,各分頁就會顯示該月的舊資料。</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>月份</th><th>房租收入</th><th>服務費</th><th>第四台</th><th>退押金</th><th>實匯屋主</th><th>收電費</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div class="tip">範圍從「起算月」到目前;之後月份越記越多,這裡就是你的對帳總表。</div></div>`;
}

/* ---- 固定調整 / 折扣（每房可多筆，可設時機）---- */
function viewAdjusts(){
  const whenOpt=w=>`<option value="every"${w==='every'?' selected':''}>每月</option><option value="even"${w==='even'?' selected':''}>雙月(收電費月)</option><option value="odd"${w==='odd'?' selected':''}>單月</option>`;
  const cards=DB.rooms.map((r,i)=>{
    const lines=(r.adjusts||[]).map((a,j)=>`<div style="display:flex;gap:6px;align-items:center;margin:6px 0;flex-wrap:wrap">
      <input data-aj-r="${i}" data-aj-j="${j}" data-aj-f="label" value="${a.label||''}" placeholder="名目" style="width:110px">
      <input type="number" data-aj-r="${i}" data-aj-j="${j}" data-aj-f="amount" value="${a.amount||0}" style="width:80px">
      <select data-aj-r="${i}" data-aj-j="${j}" data-aj-f="when">${whenOpt(a.when||'every')}</select>
      <button class="btn ghost sm" data-aj-del="${i}-${j}" style="color:var(--red)">刪</button>
    </div>`).join('');
    return `<div style="border-bottom:1px solid var(--line);padding:8px 0">
      <b>${r.no}</b>${(r.adjusts&&r.adjusts.length)?'':' <span style="color:#bbb;font-size:12px">無調整</span>'}
      ${lines}
      <button class="btn ghost sm" data-aj-add="${i}">＋ 新增調整</button>
    </div>`;
  }).join('');
  return `<div class="panel"><h2><span class="bar"></span>固定調整 / 折扣</h2>
    <div class="sub">負值=折扣(給租客減免)。時機：每月／雙月(只在收電費的雙數月生效，如梯間補貼)／單月。套用到租客訊息；屋主帳是否扣由「常數·起算」的『折扣由誰吸收』決定（目前：${DB.settings.adjustToOwner?'屋主吸收':'代管方吸收→屋主照領原租金'}）。</div>
    ${cards}</div>`;
}

    <div class="panel"><h2><span class="bar"></span>常數 · 起算</h2>
    <div class="grid2">
      <div class="fld"><label>服務費扣除額</label><input type="number" data-s="svcDeduct" value="${s.svcDeduct}"></div>
      <div class="fld"><label>服務費比例（%）</label><input type="number" data-s="svcRatePct" value="${s.svcRate*100}"></div>
      <div class="fld"><label>第四台費</label><input type="number" data-s="cableFee" value="${s.cableFee}"></div>
      <div class="fld"><label>每度電價</label><input type="number" data-s="elecRate" value="${s.elecRate}"></div>
      <div class="fld"><label>車位費/個</label><input type="number" data-s="parkingFee" value="${s.parkingFee}"></div>
      <div class="fld"><label>起算（民國年）</label><input type="number" data-s="startRoc" value="${s.startRoc}"></div>
      <div class="fld"><label>起算月</label><input type="number" data-s="startMonth" value="${s.startMonth}"></div>
      <div class="fld"><label>起算月的「上月實際匯款」起始值</label><input type="number" data-s="seedRemit" value="${s.seedRemit}"></div>
      <div class="fld"><label>固定調整由誰吸收</label><select data-s="adjustToOwner">
        <option value="1" ${s.adjustToOwner?'selected':''}>屋主吸收（屋主帳也扣）</option>
        <option value="0" ${!s.adjustToOwner?'selected':''}>代管方吸收（屋主帳不扣）</option>
      </select></div>
    </div>
    <div class="tip">第四台月份固定為 3／6／9／12。服務費＝(上月實際匯款−扣除額)×比例；第四台、退押金都會讓隔月服務費基數變小（照字面）。</div></div>

    <div class="panel"><h2><span class="bar"></span>屋主匯款帳戶</h2>
    <div class="grid2">
      <div class="fld"><label>銀行</label><input data-bk="name" value="${s.bank.name}"></div>
      <div class="fld"><label>代號</label><input data-bk="code" value="${s.bank.code}"></div>
      <div class="fld"><label>帳號</label><input data-bk="acct" value="${s.bank.acct}"></div>
    </div></div>

    <div class="panel"><h2><span class="bar"></span>租客資料</h2>${tenants}</div>

    <div class="panel" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn ghost sm" id="expBtn">匯出備份(JSON)</button>
      <button class="btn ghost sm" id="impBtn">匯入備份</button>
      <input type="file" id="impFile" class="hide" accept="application/json">
      <button class="btn ghost sm" id="resetBtn" style="color:var(--red);margin-left:auto">回復預設資料</button>
    </div>`;
}

/* =========================================================================
   事件綁定
   ========================================================================= */
function bind(){
  // 複製
  document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{copyText($('#'+b.dataset.copy).textContent);});
  const co=$('[data-copy-owner]'); if(co) co.onclick=()=>copyText(ownerText());
  const ca=$('[data-copy-acct]'); if(ca) ca.onclick=()=>copyText(`${DB.settings.bank.name}\n代號 ${DB.settings.bank.code}\n帳號 ${DB.settings.bank.acct}`);
  // 電表 OCR 批次辨識
  const ob=$('#ocrBtn'); if(ob) ob.onclick=runOCR;
  // 電表本期度數
  document.querySelectorAll('[data-reading]').forEach(inp=>inp.onchange=()=>{getMonth(Y,M).readings[inp.dataset.reading]=inp.value;save();render();});
  // 退押金
  document.querySelectorAll('[data-dep]').forEach(inp=>inp.onchange=()=>{getMonth(Y,M).deposits[inp.dataset.dep]=inp.value;save();render();});
  // 台電帳單(多張):金額/度數/名稱
  document.querySelectorAll('[data-eb]').forEach(inp=>inp.onchange=()=>{
    const mo=getMonth(Y,M); mo.elecBills[+inp.dataset.eb][inp.dataset.f]=inp.value; save(); render();
  });
  document.querySelectorAll('[data-eb-del]').forEach(b=>b.onclick=()=>{
    const mo=getMonth(Y,M); mo.elecBills.splice(+b.dataset.ebDel,1); save(); render();
  });
  const ea=$('#ebAdd'); if(ea) ea.onclick=()=>{ const mo=getMonth(Y,M); (mo.elecBills=mo.elecBills||[]).push({label:'',amount:'',degrees:''}); save(); render(); };
  // 台水帳單:金額/度數
  document.querySelectorAll('[data-wb]').forEach(inp=>inp.onchange=()=>{
    const mo=getMonth(Y,M); (mo.waterBill=mo.waterBill||{})[inp.dataset.wb]=inp.value; save(); render();
  });
  // 歷史帳本：跳到該月（切到屋主對帳）
  document.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{
    const[y,m]=b.dataset.jump.split('-').map(Number); Y=y; M=m;
    $('#yIn').value=Y; $('#mIn').value=M; cur='owner'; render();
  });
  // 房間 / 租客欄位
  document.querySelectorAll('[data-r]').forEach(inp=>inp.onchange=()=>{
    const r=DB.rooms[+inp.dataset.r], f=inp.dataset.f;
    r[f]=(['name','contact','start','end','group'].includes(f))?inp.value:(+inp.value||0); save();
    if(['name','group'].includes(f)) render();
  });
  // 固定調整（多筆）
  document.querySelectorAll('[data-aj-r]').forEach(inp=>inp.onchange=()=>{
    const r=DB.rooms[+inp.dataset.ajR], j=+inp.dataset.ajJ, f=inp.dataset.ajF;
    r.adjusts[j][f]=(f==='amount')?(+inp.value||0):inp.value; save(); render();
  });
  document.querySelectorAll('[data-aj-add]').forEach(b=>b.onclick=()=>{
    const r=DB.rooms[+b.dataset.ajAdd]; (r.adjusts=r.adjusts||[]).push({label:'',amount:0,when:'every'}); save(); render();
  });
  document.querySelectorAll('[data-aj-del]').forEach(b=>b.onclick=()=>{
    const[i,j]=b.dataset.ajDel.split('-').map(Number); DB.rooms[i].adjusts.splice(j,1); save(); render();
  });
  // 常數
  document.querySelectorAll('[data-s]').forEach(inp=>inp.onchange=()=>{
    const f=inp.dataset.s;
    if(f==='svcRatePct') DB.settings.svcRate=(+inp.value||0)/100;
    else if(f==='adjustToOwner') DB.settings.adjustToOwner=(inp.value==='1');
    else DB.settings[f]=+inp.value||0;
    save(); toast('已儲存');
  });
  // 匯款帳戶
  document.querySelectorAll('[data-bk]').forEach(inp=>inp.onchange=()=>{DB.settings.bank[inp.dataset.bk]=inp.value;save();toast('已儲存');});
  // 匯出 / 匯入 / 重置
  const eb=$('#expBtn'); if(eb) eb.onclick=exportJSON;
  const ib=$('#impBtn'); if(ib) ib.onclick=()=>$('#impFile').click();
  const f=$('#impFile'); if(f) f.onchange=importJSON;
  const rb=$('#resetBtn'); if(rb) rb.onclick=()=>{if(confirm('確定回復預設資料？目前資料會清除。')){DB=structuredClone(DEFAULT);save();render();}};
}
function copyText(t){ navigator.clipboard.writeText(t).then(()=>toast('已複製')); }
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='代管記帳備份_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const rd=new FileReader(); rd.onload=()=>{try{DB=JSON.parse(rd.result);save();render();toast('已匯入');}catch(x){toast('檔案格式錯誤');}}; rd.readAsText(file);
}
let toastT;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

/* ---- 電表 OCR:照片縮圖→base64,送 Edge Function 用 Claude 辨識 ---- */
function fileToB64(file, maxEdge=1600){
  return new Promise((resolve,reject)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      let w=img.width,h=img.height;
      const s=Math.min(1, maxEdge/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg',0.85).split(',')[1]); // 只取 base64
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('圖片讀取失敗')); };
    img.src=url;
  });
}
async function runOCR(){
  const files=[...($('#ocrFiles')?.files||[])];
  if(!files.length){ toast('請先選電表照片'); return; }
  const st=$('#ocrStatus'); const btn=$('#ocrBtn');
  if(st) st.textContent=`辨識中…(${files.length} 張,約需數十秒)`;
  if(btn) btn.disabled=true;
  try{
    const images=[];
    for(const f of files) images.push({media_type:'image/jpeg', data: await fileToB64(f)});
    const {data,error}=await sb.functions.invoke('read-meters',{body:{images}});
    if(error) throw error;
    let res=data; if(typeof res==='string'){ try{res=JSON.parse(res);}catch(e){ res={}; } }
    const list=(res&&res.readings)||[];
    const mo=getMonth(Y,M); let ok=0; const miss=[];
    list.forEach(r=>{
      const room=DB.rooms.find(x=>x.no===String(r.room));
      if(room && r.reading!=null){ mo.readings[room.no]=r.reading; ok++; }
      else miss.push(r.room||'?');
    });
    save(); render();
    toast(`已填入 ${ok} 間${miss.length?(';未對應 '+miss.join('、')):''},請核對`);
  }catch(e){
    const s=$('#ocrStatus'); if(s) s.textContent='辨識失敗:'+(e.message||e);
    const b=$('#ocrBtn'); if(b) b.disabled=false;
  }
}

bootstrap();
</script>
